<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriCrop AI Autopilot Engine</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1e293b; color: #f8fafc; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        .header { background-color: #334155; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; color: #10b981; }
        .main-container { display: flex; gap: 20px; flex: 1; min-height: 0; }
        .sidebar { flex: 1; display: flex; flex-direction: column; gap: 15px; max-width: 360px; min-height: 0; }
        .control-panel, .report-panel { background-color: #334155; padding: 18px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .control-panel { display: flex; flex-direction: column; gap: 12px; }
        .report-panel { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow-y: auto; }
        .map-container { flex: 3; }
        #map { height: 100%; width: 100%; border-radius: 12px; cursor: crosshair; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-weight: 600; color: #cbd5e1; font-size: 13px; }
        input[type="file"], button { padding: 8px; border-radius: 6px; border: 1px solid #475569; background-color: #1e293b; color: white; }
        input[type="text"] { padding: 8px; border-radius: 6px; border: 1px solid #475569; background-color: #1e293b; color: #10b981; font-weight: bold; text-align: center; }
        .btn-submit { background-color: #10b981; color: #0f172a; font-weight: bold; cursor: pointer; border: none; font-size: 14px; padding: 12px; margin-top: 5px;}
        .btn-gps { background-color: #3b82f6; color: white; font-weight: bold; cursor: pointer; border: none; padding: 10px; margin-bottom: 5px; }
        .btn-gps:hover { background-color: #2563eb; }
        .btn-submit:hover { background-color: #059669; }
        .btn-danger { background-color: #ef4444; color: white; font-weight: bold; cursor: pointer; border: none; }
        .hint { margin: 0; font-size: 12px; color: #e2e8f0; background-color: #475569; padding: 8px; border-radius: 6px; font-style: italic; border-left: 4px solid #10b981; }
        .report-card { background: #1e293b; border-radius: 8px; padding: 15px; border-left: 5px solid #3b82f6; margin-top: 10px; }
        .report-title { font-size: 16px; font-weight: bold; margin-bottom: 8px; }
        .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; margin-bottom: 10px; }
        .metric-item { background: #334155; padding: 6px; border-radius: 4px; }
        .recommendation-box { background-color: #14532d; border: 1px solid #16a34a; border-radius: 6px; padding: 10px; font-size: 13px; margin-top: 8px; color: #bbf7d0; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>AgriCrop AI Autopilot Engine</h1>
            <p style="margin:0; color: #94a3b8;">Manual Positioning, Device GPS Tracking & Machine Learning Core</p>
        </div>
        <button class="btn-danger" id="btnClearDb">🗑️ Reset Logs</button>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <div class="control-panel">
                <h3 style="margin:0; color: #cbd5e1;">Step 1: Set Target Farm Location</h3>
                <form id="reportForm" style="display:flex; flex-direction:column; gap:12px;" enctype="multipart/form-data">
                    
                    <p class="hint">💡 <b>2Ways to Position:</b>  type coordinates manually , or point on GPS locator (maps).</p>
                    

                    <button type="button" class="btn-gps" id="btnGetGPS">🎯 Use My Current GPS Location</button>

                    <div class="form-group" style="display:flex; flex-direction:row; gap:10px;">
                        <div style="flex:1;"><label>Farm Lat</label><input type="text" id="latitude" placeholder="Type or click" required style="width:90%"></div>
                        <div style="flex:1;"><label>Farm Lon</label><input type="text" id="longitude" placeholder="Type or click" required style="width:90%"></div>
                    </div>

                    <div class="form-group">
                        <label>2. Upload Leaf Photo</label>
                        <input type="file" id="imageFile" accept="image/*" required>
                    </div>

                    <button type="submit" class="btn-submit">Generate Intelligent Report</button>
                </form>
            </div>

            <div class="report-panel">
                <h3 style="margin:0; color: #cbd5e1;">Step 2: Final Advisory Insights</h3>
                <div id="reportOutputZone" style="margin-top: 10px;">
                    <p style="color:#94a3b8; font-style:italic; font-size:13px; text-align:center;">Waiting for your first AI farm diagnosis scan...</p>
                </div>
            </div>
        </div>

        <div class="map-container"><div id="map"></div></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // CRITICAL CROSS-DEVICE FIX: Change localhost to your actual backend server computer's IPv4 address 
        // Example: const SERVER_IP = "192.168.1.15"; 
        const SERVER_IP = "127.0.0.1"; // Keep 127.0.0.1 if testing on the same laptop. Swap to your IPv4 to connect physical mobile phones!

        const map = L.map('map').setView([20.5937, 78.9629], 5); // Default centered widely on regional zones
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
        const markerGroup = L.layerGroup().addTo(map);

        // A. Map Interaction Mapping Click Action
        map.on('click', function(e) {
            updateCoordinatesUI(e.latlng.lat, e.latlng.lng);
        });

        // B. Manual Typing Inputs Action
        document.getElementById('latitude').addEventListener('input', updateMapFromManualInputs);
        document.getElementById('longitude').addEventListener('input', updateMapFromManualInputs);

        function updateCoordinatesUI(lat, lon) {
            document.getElementById('latitude').value = parseFloat(lat).toFixed(6);
            document.getElementById('longitude').value = parseFloat(lon).toFixed(6);
            markerGroup.clearLayers();
            L.marker([lat, lon]).addTo(markerGroup).bindPopup("<b>Selected Target Location Point</b>").openPopup();
            map.panTo([lat, lon]);
        }

        function updateMapFromManualInputs() {
            const lat = parseFloat(document.getElementById('latitude').value);
            const lon = parseFloat(document.getElementById('longitude').value);
            if (!isNaN(lat) && !isNaN(lon)) {
                markerGroup.clearLayers();
                L.marker([lat, lon]).addTo(markerGroup);
                map.setView([lat, lon], 12);
            }
        }

        // C. Live Device Hardware Satellite GPS Sensor Interception
        document.getElementById('btnGetGPS').addEventListener('click', () => {
            if (!navigator.geolocation) {
                alert("Your browser environment configuration blocks location scanning features.");
                return;
            }
            
            // Trigger browser native hardware security prompt context
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    updateCoordinatesUI(position.coords.latitude, position.coords.longitude);
                    map.setView([position.coords.latitude, position.coords.longitude], 14);
                },
                (error) => {
                    alert("GPS Tracking failed: Ensure location permissions are active in your device settings.");
                },
                { enableHighAccuracy: true }
            );
        });

        // FORM SUBMISSION PIPELINE EXECUTION
        document.getElementById('reportForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const latVal = document.getElementById('latitude').value;
            const lonVal = document.getElementById('longitude').value;

            const formData = new FormData();
            formData.append('latitude', latVal);
            formData.append('longitude', lonVal);
            formData.append('image', document.getElementById('imageFile').files[0]);

            try {
                const response = await fetch(`http://${SERVER_IP}:8000/api/reports`, { method: 'POST', body: formData });
                if (response.ok) {
                    const report = await response.json();
                    const colorMap = { "Critical": "#ef4444", "High": "#f97316", "Medium": "#eab308", "Low": "#10b981" };
                    const accentColor = colorMap[report.severity] || "#3b82f6";

                    document.getElementById('reportOutputZone').innerHTML = `
                        <div class="report-card" style="border-left-color: ${accentColor}">
                            <div class="report-title" style="color: ${accentColor}">${report.disease_name}</div>
                            <div style="font-size:12px; margin-bottom:8px; color:#cbd5e1;">Status: <b>${report.severity} Risk Tier</b></div>
                            <div class="metric-grid">
                                <div class="metric-item"> Live Temp: <b>${report.temperature}°C</b></div>
                                <div class="metric-item">💧 Humidity: <b>${report.humidity}%</b></div>
                                <div class="metric-item">🌧️ Rain: <b>${report.rainfall}mm</b></div>
                                <div class="metric-item">🌱 Soil Content: <b>${report.soil_moisture}%</b></div>
                            </div>
                            <div class="recommendation-box">
                                <b>💡 Field Betterment Strategy:</b><br>
                                <p style="margin: 5px 0 0 0; font-size:12px; line-height:1.4;">${report.betterment_suggestion}</p>
                            </div>
                        </div>
                    `;

                    L.circleMarker([latVal, lonVal], { radius: 12, fillColor: accentColor, color: '#fff', weight: 2, fillOpacity: 0.9 })
                        .addTo(map)
                        .bindPopup(`<b>${report.disease_name}</b>`)
                        .openPopup();
                }
            } catch (err) {
                alert("Connection refused. Verify your server script configuration setup.");
            }
        });

        document.getElementById('btnClearDb').addEventListener('click', async () => {
            await fetch(`http://${SERVER_IP}:8000/api/reports/clear`, { method: 'DELETE' });
            location.reload();
        });
    </script>
</body>
</html>
